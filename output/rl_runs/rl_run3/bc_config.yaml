DATA:
  train_h5:
  - output/bc_dataset/train.h5
  - output/bc_dataset/dagger_iter_2_1.h5
  - output/bc_dataset/dagger_iter_2_2.h5
  - output/bc_dataset/dagger_iter_2_3.h5
  val_h5: output/bc_dataset/val.h5
  pc_channels: 5
  robot_state_dim: 32
  action_dim: 7
MODEL:
  feature_dim: 256
  robot_hidden: 128
  policy_hidden:
  - 256
  - 256
  pointnet_scale: 1
  pointnet_radius: 0.02
  pointnet_nclusters: 32
  use_prev_act: false
  pc_pretrained: output/cvpr2023_models/2022-10-16_08-48-30_finetune_5_s0_train/DDPG_state_feat_PandaYCBEnv_latest
  freeze_pc: false
OPTIM:
  kind: adamw
  lr: 0.001
  weight_decay: 0.0001
  scheduler: cosine
LOSS:
  gripper_weight: 1.0
TRAIN:
  batch_size: 64
  num_epochs: 50
  num_workers: 4
  device: cuda
  mixed_precision: false
  val_every: 1
  save_every: 5
  grad_clip: 1.0
  seed: 0
