# Phase-3 RL config — rl_run23 (CLUSTER, 16 workers). Branches off run15's config.
#
# Three deliberate changes vs run15, on top of the run21(vgd) hand-filter swap:
#   1. WIDENING reverse curriculum (NEW code path expert_initial_lo_start): hold the
#      upper takeover bound FIXED at 24 and anneal only the LOWER bound 22 -> 2 over
#      150 iters. The sampled band widens [22,24] -> [2,24] instead of sliding down,
#      so a thin tail of near-grasp (endgame) takeovers is RETAINED for the whole run
#      while harder off-plan starts are added. Targets the run15/21 post-curriculum
#      decline (the sliding window abandons endgame practice once hi drops past it,
#      so the reach-close skill decays). lo_end=2 keeps the band matched to the
#      from-scratch eval. Anneal 150/250 iters (60%), holds [2,24] for the last 100.
#   2. expert_episode_frac 0.25 -> 0.5 (paper-faithful: Christen pretrain runs
#      1 - explore_ratio = 0.5 full-expert episodes) — more +1 anchors / pose-BC.
#   3. noise_std 0.10 -> 0.03 (near the paper's action_noise=0.01 magnitude): quiet
#      the policy exploration but keep a little critic (s,a) coverage (not 0).
#
# HAND FILTER = run21(vgd), NOT run15: use the PAPER's offline valid_grasp_dict
# (~716 s0 scenes) and DISABLE our aggressive 0.08 m runtime filter, so grasps come
# ONLY from the filtered pose set (no double-filtering). Pair with the vgd demos:
#   --demos output/rl_demos/train_h30_vgd.h5
# Everything else (algorithm, DART, DAgger, blend) = run15/run21 exact values.

DATA:
  num_pts:         1024
  pc_channels:     5

MODEL:
  q_hidden:  [256, 256]
  clock_dim: 1

RL:
  gamma:        0.95
  tau:          0.005
  policy_noise: 0.2
  noise_clip:   0.5
  act_limit:    5.0
  policy_delay: 2
  mc_blend:     0.5
  pose_loss:    smooth_l1
  bc_weight:    2.0
  gripper_bc_weight: 1.0
  gripper_close_weight_max: 10.0
  gripper_label_smooth: 0.1
  shaping_pos_weight: 0.0
  shaping_rot_weight: 0.0
  aux_weight:   0.5
  reward_mode:  stable_grasp
  hold_steps:   3
  # HAND-COLLISION FILTER — PAPER'S offline valid_grasp_dict (run21/vgd), NOT run15's
  # runtime 0.08 m filter. valid_grasp_dict_005.pkl = CVPR2023 per-scene hand-free
  # ACRONYM indices (~716/720 s0 scenes). hand_collision_filter=false so our runtime
  # filter is OFF and does not double-filter the already-filtered pose set.
  valid_grasp_dict_path: examples/valid_grasp_dict_005.pkl
  hand_collision_filter: false  # our 0.08 m runtime filter OFF (valid_grasp_dict replaces it)
  hand_collision_thresh: 0.08   # (unused while hand_collision_filter=false)
  hand_points_radius:    0.35   # (unused while hand_collision_filter=false)
  pg_normalize: true
  alpha:        0.1
  mix_start:    0.1
  mix_end:      0.2
  mix_ramp:     50000
  actor_lr:     3.0e-4
  critic_lr:    3.0e-4
  grad_clip:    1.0

LOOP:
  capacity:             20000
  pretrain_updates:     2000
  demo_frac:            0.25
  demo_frac_start:      0.5
  demo_frac_end:        0.3
  demo_frac_ramp:       125
  warmup_episodes:      0
  warmup_beta:          1.0
  episodes_per_iter:    16
  updates_per_iter:     800
  batch_size:           64
  num_iters:            250
  # exploration
  noise_std:            0.03    # CHANGE 3: was 0.10 (near paper action_noise=0.01)
  # ── WIDENING reverse curriculum (CHANGE 1) ────────────────────────────────
  # NEW mode: expert_initial_lo_start present => hold hi fixed, anneal lo only.
  # band widens [lo_start, hi] -> [lo_end, hi] over expert_initial_anneal_iters.
  expert_initial_hi:            24    # FIXED upper takeover bound (never anneals)
  expert_initial_lo_start:      22    # lower bound at iter 0  -> band [22,24]
  expert_initial_lo_end:        2     # lower bound after anneal -> band [2,24]
  expert_initial_anneal_iters:  150   # anneal lo 22->2 over 150 iters, then hold
  expert_episode_frac:  0.5     # CHANGE 2: was 0.25 (paper-faithful full-expert frac)
  rollout_max_steps:    30
  # DAgger tail replans (run15 values)
  dagger_ratio:         0.5
  dagger_min_step:      5
  dagger_tail_guard:    8
  # DART — run15's winning policy-DART config (peak 0.458), UNCHANGED
  dart_mode:            policy
  dart_ratio:           0.2
  dart_min_step:        15
  dart_max_step:        22
  dart_pos_mag:         0.04
  dart_rot_mag:         0.2
  beta_start:           0.5
  beta_end:             0.0
  beta_ramp_iters:      63
  # eval / checkpoint
  eval_every:           7
  eval_episodes:        64
  save_every:           7
