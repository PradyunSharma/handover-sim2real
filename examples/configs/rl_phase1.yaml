# Phase-3 RL config — online TD3 + BC (GA-DDPG-style blend).
#
# Used by examples/train_rl.py. The scene/encoder/head dims come from the BC run
# you warm-start from (--bc-run's config.yaml is authoritative), so the MODEL
# block here only sets the critic-specific + clock knobs. Sim settings come from
# --sim-cfg (e.g. examples/pretrain.yaml).

DATA:
  num_pts:         1024
  pc_channels:     5

MODEL:
  q_hidden:  [256, 256]   # twin-critic head width
  clock_dim: 1            # remaining-steps clock width (fed to actor + critic)

RL:
  gamma:        0.95      # discount (must be <1: finite-horizon, clock-in-state)
  tau:          0.005     # Polyak soft-update rate for targets
  policy_noise: 0.2       # TD3 target-smoothing noise std (normalized action units)
  noise_clip:   0.5       # target-smoothing noise clamp
  act_limit:    5.0       # normalized action clamp (|Δ| in std units)
  policy_delay: 2         # TD3 delayed actor/target updates
  mc_blend:     0.5       # critic target = (1-b)*Bellman + b*MC return (sparse-reward aid)
  # pose-BC loss form. "smooth_l1" = L1 on the raw NORMALIZED [Δpos ‖ Δeuler].
  # "pm" = point-matching on gripper control points (GA-DDPG core/loss.py). NOTE
  # (rl_run10, REVERTED): PM sounded better (proper SE(3) metric) but at our small
  # sub-0.34-rad deltas it actually WEIGHTED ROTATION ~6x LESS than smooth_l1 — the
  # small rotation-channel std makes normalized-L1 a strong rotation weighter
  # (rot/pos ~6.6x at the success thresholds vs PM's 1.2x), so PM regressed
  # eval_min_rot. Keep smooth_l1 (run9's setting).
  pose_loss:    smooth_l1
  bc_weight:    2.0       # weight on the actor pose-BC term (plan-tracking online-
                          # DAgger labels, at the policy's OWN visited states).
  gripper_bc_weight: 1.0  # weight on the actor gripper BCE term (proximity label:
                          # open far / close near). Agrees with the close reward;
                          # the policy still executes its own logit at deployment.
  gripper_close_weight_max: 10.0  # class-balance the gripper BCE: "close" (near-
                          # grasp) is the rare label per batch, so plain BCE learns
                          # only "open" and the gripper stays pinned open (BC base:
                          # gprob==1.0 the whole rollout, never fires). Upweight close
                          # examples to ~match the open mass, capped here.
  # rl_run11 gripper-drift fix: label-smooth the gripper BCE (targets 1->1-eps,
  # 0->eps). Root cause of the run9 late decline: the "open" label (=1, far from
  # grasp) vastly outnumbers "close", so plain BCE drives the logit -> +inf; once it
  # saturates (~+33) sigmoid=1 -> the gradient vanishes and the rare close states
  # can't pull it back, so late checkpoints STOP closing (last.pt: close_rate 4%,
  # all TIMEOUT). Smoothing caps the logit at a bounded, RESPONSIVE value (logit(0.9)
  # ~= +2.2) so close states can always fire it. Touches only the gripper BCE. 0
  # disables (run9 behaviour).
  gripper_label_smooth: 0.1
  aux_weight:   0.5       # goal-auxiliary: regress the EE-relative grasp pose on both
                          # encoders (0 disables). Dense supervision that shapes the
                          # PointNet++ features for the sparse-reward regime.
  # potential-based reward shaping (Ng et al. 1999) on the EE->grasp DISTANCE — an
  # ADDITIVE, provably policy-invariant learning aid ON TOP of the sparse close
  # reward (NOT a replacement): Φ(s)=−(pos_w·‖ee→grasp‖ + rot_w·angle), shaping term
  # γΦ(s')(1−term)−Φ(s) added to the Bellman target. Gives the critic/PG a dense
  # reach gradient the sparse reward lacks — targets the 0.05 m fine-approach ceiling.
  # BOTH 0 = DISABLED (run9/11/12/13 behaviour). rl_run14 experiment: try pos_w≈1.0,
  # rot_w≈0.3 (position is the harder constraint). Eval success stays the sparse
  # policy-close metric (shaping is training-only, in the critic target). Do NOT
  # enable for run13 (would confound the curriculum test).
  shaping_pos_weight: 0.0
  shaping_rot_weight: 0.0
  # reward: how a committed close is scored (terminal either way).
  #   stable_grasp = contact-hold grasp check — hold the close `hold_steps` policy-
  #     steps and require the object to be secured (handover-sim's release handshake
  #     fired AND no drop). Paper-faithful (cf. GA-DDPG's lift test), no OMG grasp
  #     pose needed for the reward, and closest to the real benchmark.
  #   proximity = EE within (close_pos_thresh 0.02 m, close_rot_thresh 0.34 rad) of
  #     the OMG grasp pose at the close (cheaper, but a geometric proxy).
  reward_mode:  stable_grasp
  hold_steps:   3
  # hand-collision grasp filter (paper): OMG prunes grasp candidates whose gripper
  # would collide with the human hand, so the expert reaches a hand-free grasp
  # instead of driving into the hand (FAILURE_HUMAN_CONTACT). Applies to demo
  # collection and the online OMG expert. A scene is skipped if every grasp collides.
  hand_collision_filter: true
  hand_collision_thresh: 0.08   # m, gripper control point -> nearest hand point.
                                # Checked at the FINAL grasp; 0.08 (not 0.04) because
                                # the sparse control-point/skeleton metric under-reads
                                # true mesh clearance by a few cm (calibrated: 0.08
                                # eliminates human-contact without over-pruning; 0.10
                                # starts dropping good scenes).
  hand_points_radius:    0.35   # m, keep MANO links within this of the object
  # PG/BC blend: false = GA-DDPG mix schedule (mix_start->mix_end); true = TD3+BC alpha/|Q|.
  # MUST be true here: with a FIXED lambda the PG term -(lam*Q) grows unbounded as the
  # actor exploits the critic's out-of-distribution extrapolation (rl_run1 diverged in
  # ~15 iters: Q(s,pi(s)) hit 1.6e5, pg_loss -1.6e4, bc_loss 2e6, 0% success forever).
  # pg_normalize scales the PG term by 1/mean|Q| so it stays ~alpha and can't starve BC.
  pg_normalize: true
  alpha:        0.1       # TD3+BC PG scale (pg_normalize pins the PG term ~alpha).
                          # run9's value. (rl_run10 raised it 0.1->0.25 to push the
                          # reach; REVERTED — it did NOT help reach and the run
                          # regressed. Revisit only as an isolated single change.)
  mix_start:    0.1       # RL weight early (BC-dominated)
  mix_end:      0.2       # RL weight late
  mix_ramp:     50000     # updates to ramp mix_start->mix_end
  actor_lr:     3.0e-4
  critic_lr:    3.0e-4
  grad_clip:    1.0

LOOP:
  capacity:             20000   # replay transitions (~0.8 GB at 1024x5 clouds)
  # offline demo pre-training: before any rollout, run this many gradient updates
  # on the demo pool ONLY (calibrates the critic + actor so PG doesn't hit a random
  # critic — the rl_run1 divergence root). 0 disables. Fresh runs only (not --resume).
  pretrain_updates:     2000
  # demo mixing: fraction of each online batch drawn from the permanent demo pool
  # (DDPGfD). Scheduled demo_frac_start -> demo_frac_end over demo_frac_ramp iters,
  # then HELD at demo_frac_end (a permanent floor — never 0, since the online expert
  # produces no successes so the demos are the only +1 source). If the *_start knob
  # is absent it falls back to the constant demo_frac.
  demo_frac:            0.25    # fallback constant (used only if demo_frac_start unset)
  demo_frac_start:      0.5     # demo-heavy early (offline->online transition)
  demo_frac_end:        0.3     # permanent floor (keeps the +1 anchor). Raised
                                # 0.1->0.3: the frozen demo pool is the strongest
                                # on-manifold signal; annealing it away let the
                                # policy drift toward its own zero-reward rollouts
                                # (rl_run5 decayed after pretrain). Keep it strong.
  demo_frac_ramp:       2000    # iters to anneal start->end (rl_run13: doubled with num_iters)
  warmup_episodes:      0       # online expert reaches 0 successes; demo pool + pretrain
                                # replace it. >0 seeds the online buffer expert-heavy.
  warmup_beta:          1.0     # expert-heavy warmup (seed with successes)
  episodes_per_iter:    2
  updates_per_iter:     100
  batch_size:           64
  num_iters:            4000    # rl_run13: extended 2000->4000 (paired w/ slower curriculum)
  # exploration
  noise_std:            0.1     # rollout action noise (normalized units)
  # reverse-curriculum warm start (GA-DDPG expert_initial): each POLICY episode
  # first follows the FULL step-0 OMG trajectory BY INDEX for a RANDOM 0..N steps
  # (sampled per episode in collect), so the policy takes over near the grasp and
  # can finish+close → earns its OWN +1 (buf_pos>0). 0 disables (rl_run<=5 had 0,
  # so the policy always started far and never reached → buf_pos=0 → decay).
  expert_initial_steps: 28
  # reverse-curriculum ANNEAL (rl_run9): slide the takeover window from a tight band
  # right at the grasp (early: policy only does the reach-tail descent+close, earns
  # reward, grows the critic's high-Q region) toward 0 (late: from scratch). The
  # window each iter is [expert_initial_steps..expert_initial_end] linearly over
  # anneal_iters, minus `window`. Set `expert_initial_anneal_iters` to ENABLE the
  # anneal; omit it to keep the old uniform (0..expert_initial_steps) sampling.
  # rl_run8 used the uniform form and stalled ~0.08 m: intermediate takeovers never
  # mastered the endgame first, so they earned no reward and Q never grew past the
  # last ~2 steps. Ramp over ~2/3 of the run so it ends with plenty of from-scratch.
  # reverse-curriculum anneal (run9's winning values; rl_run10's slower+wider
  # variant REGRESSED — the wider final band [0..8] under-practiced the from-scratch
  # eval task, which is always ei=0). The window [hi-window .. hi] slides
  # hi: expert_initial_steps -> expert_initial_end over anneal_iters, then holds.
  expert_initial_anneal_iters: 2800   # rl_run13: HIGHER-FRACTION curriculum (~70% of the
                                      # 4000-iter run, vs 27% before) — more mastery per
                                      # rung, shorter from-scratch tail. (cluster: 350.)
  expert_initial_end:   2       # final upper bound (near-from-scratch, matches eval)
  expert_initial_window: 6      # width of the sampled band (hi-window .. hi)
  # fraction of online episodes that are FULL-expert rollouts (GA-DDPG non-explore):
  # play the whole OMG traj to the grasp + close + reward. A guaranteed fresh
  # success into the ONLINE buffer every iter (the frozen demo pool goes stale
  # relative to the drifting policy; this keeps a live +reward anchor).
  expert_episode_frac:  0.25
  # episode horizon (clock denominator + OMG plan length; also the worker's OMG
  # planning horizon). Raised to 30: check C showed the from-scratch policy needs
  # ~30 steps to approach (at step 20 it's still 0.18-0.34 m out, matching the RL
  # eval's 0.25 m) AND the reverse curriculum needs room to place the policy near
  # the grasp (ei up to 25) with steps left to settle+close. 0 = use cfg.RL_MAX_STEP.
  # NOTE: the demo pool must be recollected at the SAME horizon (clock is normalized
  # by max_steps, so a 20-step pool + 30-step online mixes inconsistent clocks).
  rollout_max_steps:    30
  # DAgger TAIL replans (GA-DDPG get_flags + expert_plan(step=remaining)): with
  # this per-step prob, re-fit the REST of the committed plan to the policy's
  # drifted state over the REMAINING steps and splice it in. Window:
  # dagger_min_step < step < len(plan) - dagger_tail_guard. The tail guard keeps
  # the standoff->grasp reach labels committed — the OLD per-step plan[0]-of-a-
  # fresh-short-replan label never entered the reach tail and Zeno-decayed at the
  # standoff (0.08 m short), teaching the policy to hover there (rl_run7 plateau,
  # broken BC base). GA-DDPG values: ratio 0.5, min 5, guard 8.
  # rl_run12 tried ratio 1.0 (feasible mid-traj labels) — NEGATIVE (didn't bound
  # |a_pose|, didn't move the 0.05 m reach ceiling). Reverted to run9/run11's 0.5.
  dagger_ratio:         0.5
  dagger_min_step:      5
  dagger_tail_guard:    8
  beta_start:           0.5     # mid-episode expert-execution prob at iter 0 (executes
                                # the committed plan's CURRENT waypoint -> snaps the EE
                                # back onto the plan)
  beta_end:             0.0     # expert-execution prob at the end
  beta_ramp_iters:      2520    # rl_run13: scaled to track the curriculum (cluster: 315)
  # eval / checkpoint
  eval_every:           50
  eval_episodes:        50      # 20 can't resolve a low single-digit success rate
                                # (E[successes] < 1); 50 gives a usable eval_min_pos too
  save_every:           50
